services:
  db:
    image: postgres:16-alpine
    container_name: football_scout_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scout_panel
    ports:
      - "5432:5432"
    volumes:
      - scout_panel_postgres:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_scout_server
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/scout_panel?schema=public
    ports:
      - "3000:3000"

volumes:
  scout_panel_postgres:
