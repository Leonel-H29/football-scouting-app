services:
  db:
    image: postgres:16-alpine
    container_name: football_scout_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scout_panel
    ports:
      - '5433:5432'
    volumes:
      - scout_panel_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d scout_panel']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_scout_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '3000:3000'

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: football_scout_pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    volumes:
      - scout_panel_pgadmin:/var/lib/pgadmin

volumes:
  scout_panel_postgres:
  scout_panel_pgadmin:
